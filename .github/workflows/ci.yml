name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  chat-service:
    name: Chat Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: chat_service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: chat_service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

  auth-service:
    name: Auth Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auth_service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: auth_service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

  users-service:
    name: Users Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: users_service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: users_service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check